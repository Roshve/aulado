<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 666" width="1000" height="666">
  <!-- Fondo del piso -->
  <rect width="1000" height="666" fill="#e8eaed" rx="8"/>

  <!-- Contorno del edificio (placeholder rectangular) -->
  <rect x="40" y="40" width="920" height="586" fill="#f0f2f5" stroke="#bfc5d1" stroke-width="3" rx="4"/>

  <!-- Grilla en % (líneas cada 10%) -->
  <!-- Líneas verticales: x = 100, 200, ... 900 px = 10%, 20%, ... 90% de 1000px -->
  <g stroke="#cdd1da" stroke-width="1" stroke-dasharray="4 4">
    <line x1="100" y1="0" x2="100" y2="666"/>
    <line x1="200" y1="0" x2="200" y2="666"/>
    <line x1="300" y1="0" x2="300" y2="666"/>
    <line x1="400" y1="0" x2="400" y2="666"/>
    <line x1="500" y1="0" x2="500" y2="666"/>
    <line x1="600" y1="0" x2="600" y2="666"/>
    <line x1="700" y1="0" x2="700" y2="666"/>
    <line x1="800" y1="0" x2="800" y2="666"/>
    <line x1="900" y1="0" x2="900" y2="666"/>
    <!-- Líneas horizontales: y = 66.6, 133.2, ... = 10%, 20%, ... 90% de 666px -->
    <line x1="0" y1="66.6" x2="1000" y2="66.6"/>
    <line x1="0" y1="133.2" x2="1000" y2="133.2"/>
    <line x1="0" y1="199.8" x2="1000" y2="199.8"/>
    <line x1="0" y1="266.4" x2="1000" y2="266.4"/>
    <line x1="0" y1="333" x2="1000" y2="333"/>
    <line x1="0" y1="399.6" x2="1000" y2="399.6"/>
    <line x1="0" y1="466.2" x2="1000" y2="466.2"/>
    <line x1="0" y1="532.8" x2="1000" y2="532.8"/>
    <line x1="0" y1="599.4" x2="1000" y2="599.4"/>
  </g>

  <!-- Etiquetas de % en eje X (arriba) -->
  <g fill="#9aa3b2" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">
    <text x="100" y="14">10%</text>
    <text x="200" y="14">20%</text>
    <text x="300" y="14">30%</text>
    <text x="345" y="14">34.5%</text>
    <text x="400" y="14">40%</text>
    <text x="500" y="14">50%</text>
    <text x="600" y="14">60%</text>
    <text x="700" y="14">70%</text>
    <text x="800" y="14">80%</text>
    <text x="900" y="14">90%</text>
  </g>

  <!-- Etiquetas de % en eje Y (izquierda) -->
  <g fill="#9aa3b2" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">
    <text x="95" y="70.6">10%</text>
    <text x="95" y="137.2">20%</text>
    <text x="95" y="203.8">30%</text>
    <text x="95" y="270.4">40%</text>
    <text x="95" y="337">50%</text>
    <text x="95" y="403.6">60%</text>
    <text x="95" y="470.2">70%</text>
    <text x="95" y="536.8">80%</text>
    <text x="95" y="603.4">90%</text>
  </g>

  <!-- Marcador guía de la Secretaría (34.5%, 60.2%) -->
  <!-- Se muestra en el placeholder para referencia visual; el app pone el marcador animado encima -->
  <circle cx="345" cy="400.5" r="6" fill="#1a6fd8" opacity="0.3"/>

  <!-- Habitaciones placeholder (PB) -->
  <rect x="60" y="60" width="280" height="200" fill="#dce0e8" stroke="#bfc5d1" stroke-width="1.5"/>
  <text x="200" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#6b7585">Aula PB-01</text>

  <rect x="360" y="60" width="280" height="200" fill="#dce0e8" stroke="#bfc5d1" stroke-width="1.5"/>
  <text x="500" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#6b7585">Aula PB-02</text>

  <rect x="660" y="60" width="280" height="200" fill="#dce0e8" stroke="#bfc5d1" stroke-width="1.5"/>
  <text x="800" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#6b7585">Aula PB-03</text>

  <!-- Pasillo -->
  <rect x="60" y="280" width="880" height="80" fill="#e0e4eb" stroke="#bfc5d1" stroke-width="1"/>
  <text x="500" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#9aa3b2">— PASILLO —</text>

  <!-- Secretaría (marcada en el JSON: 34.5%, 60.2%) -->
  <rect x="60" y="380" width="400" height="220" fill="#d5e8f5" stroke="#7ab4de" stroke-width="2"/>
  <text x="260" y="500" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#1a6fd8" font-weight="600">Secretaría de Alumnos</text>

  <!-- Baño PB -->
  <rect x="490" y="380" width="200" height="100" fill="#e4f5e4" stroke="#8cc88c" stroke-width="1.5"/>
  <text x="590" y="436" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#3a8a3a">Baños</text>

  <!-- Label del plano -->
  <text x="500" y="656" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#9aa3b2">
    PLACEHOLDER — Edificio B · Planta Baja · reemplazar con plano real
  </text>
</svg>
